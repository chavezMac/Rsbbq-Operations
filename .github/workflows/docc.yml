# Swift DocC: build documentation and optionally publish to GitHub Pages
# Requires a Documentation Catalog in the Xcode project (e.g. RSBBQOperations.docc).
# In repo Settings → Pages, set Source to "GitHub Actions" to enable deployment.

name: DocC

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "docc-${{ github.ref }}"
  cancel-in-progress: true

env:
  SCHEME: RSBBQOperations
  PROJECT_PATH: Ops_files/RSBBQOperations.xcodeproj
  DERIVED_DATA: /tmp/docbuild

jobs:
  build-docs:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Project targets iOS 26+ and uses objectVersion 77; use Xcode 26 on macos-26 runner
          xcode-version: "26.2"

      - name: Provide Secrets.xcconfig for CI
        run: |
          CONFIG="Ops_files/RSBBQOperations/Config.xcconfig"
          if [ -f "$CONFIG" ]; then
            cp "$CONFIG" "Ops_files/RSBBQOperations/Secrets.xcconfig"
          else
            echo "API_BASE_URL = https://placeholder.example" > "Ops_files/RSBBQOperations/Secrets.xcconfig"
            echo "INFOPLIST_KEY_APIBaseURL = \$(API_BASE_URL)" >> "Ops_files/RSBBQOperations/Secrets.xcconfig"
          fi

      - name: Build DocC archive
        run: |
          # Skip code signing in CI (no provisioning profiles); we only need the doc archive
          xcodebuild docbuild \
            -scheme "${{ env.SCHEME }}" \
            -project "${{ env.PROJECT_PATH }}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Find DocC archive
        id: archive
        run: |
          ARCHIVE=$(find "${{ env.DERIVED_DATA }}" -name "*.doccarchive" -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "No .doccarchive found. Add a Documentation Catalog to the Xcode project (File → New → File → Documentation Catalog) and link it to the app target."
            exit 1
          fi
          echo "path=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Transform for static hosting
        run: |
          ARCHIVE="${{ steps.archive.outputs.path }}"
          # Base path for GitHub Pages: https://<owner>.github.io/<repo>/
          $(xcrun --find docc) process-archive transform-for-static-hosting "$ARCHIVE" \
            --output-path docs \
            --hosting-base-path '/${{ github.event.repository.name }}'

      - name: Add redirect index for GitHub Pages
        run: |
          MODULE=$(basename "${{ steps.archive.outputs.path }}" .doccarchive)
          MODULE_LOWER=$(echo "$MODULE" | tr '[:upper:]' '[:lower:]')
          # Full HTML at root so GitHub Pages serves the site; relative URL works for any repo path
          cat > docs/index.html << INDEXEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>RSBBQ Operations — Documentation</title>
          <meta http-equiv="refresh" content="0;url=documentation/${MODULE_LOWER}/">
          <script>var p = window.location.pathname.replace(/\\/?\$/, ""); window.location.replace(p + "/documentation/${MODULE_LOWER}/");</script>
          </head>
          <body>
          <p>Redirecting to <a href="documentation/${MODULE_LOWER}/">documentation</a>…</p>
          </body>
          </html>
          INDEXEOF

      - name: Upload DocC artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
